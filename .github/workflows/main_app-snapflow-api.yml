name: Build and deploy ASP.Net Core app to Azure Web App - app-snapflow-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore server/src/Presentation/Presentation.csproj

      - name: Build with dotnet
        run: dotnet build server/src/Presentation/Presentation.csproj --configuration Release --no-restore

      - name: dotnet publish
        run: dotnet publish server/src/Presentation/Presentation.csproj -c Release -o "${{github.workspace}}/publish"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{github.workspace}}/publish

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./publish
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-snapflow-api'
          publish-profile: ${{ secrets.AZURE_SERVER_PUBLISH_PROFILE }}
          package: ./publish
