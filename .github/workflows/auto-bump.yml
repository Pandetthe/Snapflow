on:
  workflow_run:
    workflows: ["Server CI", "Web CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: version-bump-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    name: Bump and Tag
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for real changes
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Last tag: $LAST_TAG"

          REAL_CHANGES=$(git diff --name-only $LAST_TAG HEAD | grep -vE '(\.md$|LICENSE$|^\.gitignore$|^\.dockerignore$|^\.editorconfig$|^\.github/|^\.vscode/|^scripts/)' | wc -l || echo "0")

          echo "Meaningful changes detected: $REAL_CHANGES"
          echo "count=$REAL_CHANGES" >> $GITHUB_OUTPUT

      - name: Bump Versions
        if: github.event_name == 'workflow_dispatch' || steps.check.outputs.count > 0
        id: bump
        run: node scripts/bump-versions.mjs

      - name: Commit, Push and Tag
        if: github.event_name == 'workflow_dispatch' || steps.check.outputs.count > 0
        run: |
          VERSION=${{ steps.bump.outputs.new_version }}
          git add .
          git commit -m "chore(release): $VERSION [skip ci]"
          git tag v$VERSION
          git push origin main --tags
