name: Deploy to Azure

on:
  workflow_run:
    workflows: ["Publish"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  deployments: write

concurrency:
  group: azure-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-server:
    name: Deploy Server
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.name == 'Publish' && github.event.workflow_run.conclusion == 'success') }}
    steps:
      - name: Resolve ref and release tag
        id: vars
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            REF="${{ github.event.workflow_run.head_sha }}"
          else
            REF="${{ github.sha }}"
          fi
          echo "ref=$REF" >> $GITHUB_OUTPUT

          REL_TAG=$(gh api -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/releases/latest" \
            --jq '.tag_name' 2>/dev/null || true)

          if [ -z "$REL_TAG" ]; then
            echo "No latest release tag found; cannot deploy a version tag."
            exit 1
          fi

          echo "rel_tag=$REL_TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Deployment (server)
        id: create_deploy
        uses: actions/github-script@v7
        env:
          REL_TAG: ${{ steps.vars.outputs.rel_tag }}
        with:
          script: |
            const ref = "${{ steps.vars.outputs.ref }}";
            const environment = "Production";
            const res = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref,
              environment,
              auto_merge: false,
              required_contexts: [],
              description: `Deploy server ${process.env.REL_TAG}`.trim()
            });
            core.setOutput("deployment_id", String(res.data.id));

      - name: Mark Deployment In Progress (server)
        uses: actions/github-script@v7
        with:
          script: |
            const deployment_id = Number("${{ steps.create_deploy.outputs.deployment_id }}");
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id,
              state: "in_progress",
              description: "Deploying server to Azure..."
            });

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ACASNAPFLOWSERVERPROD_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ACASNAPFLOWSERVERPROD_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ACASNAPFLOWSERVERPROD_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Server to Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: aca-snapflow-server-prod
          resourceGroup: snapflow
          imageToDeploy: ghcr.io/pandetthe/snapflow-server:${{ steps.vars.outputs.rel_tag }}
          registryUrl: ghcr.io
          registryUsername: ${{ secrets.ACASNAPFLOWSERVERPROD_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ACASNAPFLOWSERVERPROD_REGISTRY_PASSWORD }}

      - name: Mark Deployment Success (server)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const deployment_id = Number("${{ steps.create_deploy.outputs.deployment_id }}");
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id,
              state: "success",
              description: "Server deployed successfully."
            });

      - name: Mark Deployment Failure (server)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const deployment_id = Number("${{ steps.create_deploy.outputs.deployment_id }}");
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id,
              state: "failure",
              description: "Server deployment failed."
            });

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.name == 'Publish' && github.event.workflow_run.conclusion == 'success') }}
    steps:
      - name: Resolve ref and release tag
        id: vars
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            REF="${{ github.event.workflow_run.head_sha }}"
          else
            REF="${{ github.sha }}"
          fi
          echo "ref=$REF" >> $GITHUB_OUTPUT

          REL_TAG=$(gh api -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/releases/latest" \
            --jq '.tag_name' 2>/dev/null || true)

          if [ -z "$REL_TAG" ]; then
            echo "No latest release tag found; cannot deploy a version tag."
            exit 1
          fi

          echo "rel_tag=$REL_TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Deployment (web)
        id: create_deploy
        uses: actions/github-script@v7
        env:
          REL_TAG: ${{ steps.vars.outputs.rel_tag }}
        with:
          script: |
            const ref = "${{ steps.vars.outputs.ref }}";
            const environment = "Production";
            const res = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref,
              environment,
              auto_merge: false,
              required_contexts: [],
              description: `Deploy web ${process.env.REL_TAG}`.trim()
            });
            core.setOutput("deployment_id", String(res.data.id));

      - name: Mark Deployment In Progress (web)
        uses: actions/github-script@v7
        with:
          script: |
            const deployment_id = Number("${{ steps.create_deploy.outputs.deployment_id }}");
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id,
              state: "in_progress",
              description: "Deploying web to Azure..."
            });

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ACASNAPFLOWWEBPROD_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ACASNAPFLOWWEBPROD_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ACASNAPFLOWWEBPROD_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Web to Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: aca-snapflow-web-prod
          resourceGroup: snapflow
          imageToDeploy: ghcr.io/pandetthe/snapflow-web:${{ steps.vars.outputs.rel_tag }}
          registryUrl: ghcr.io
          registryUsername: ${{ secrets.ACASNAPFLOWWEBPROD_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ACASNAPFLOWWEBPROD_REGISTRY_PASSWORD }}

      - name: Mark Deployment Success (web)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const deployment_id = Number("${{ steps.create_deploy.outputs.deployment_id }}");
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id,
              state: "success",
              description: "Web deployed successfully."
            });

      - name: Mark Deployment Failure (web)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const deployment_id = Number("${{ steps.create_deploy.outputs.deployment_id }}");
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id,
              state: "failure",
              description: "Web deployment failed."
            });
