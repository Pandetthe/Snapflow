name: Publish

on:
  workflow_run:
    workflows: ["Build & Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publication-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  bump:
    name: Bump and Tag
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tagged: ${{ steps.tag_check.outputs.tagged }}
      tag: ${{ steps.tag_check.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for real changes
        id: check
        shell: bash
        run: |
          set -euo pipefail

          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            LAST_REF="$(git describe --tags --abbrev=0)"
            echo "Last tag: $LAST_REF"
          else
            LAST_REF="$(git rev-list --max-parents=0 HEAD)"
            echo "No tags found. Using first commit as base: $LAST_REF"
          fi

          REAL_CHANGES=$(
            git diff --name-only "$LAST_REF" HEAD |
            grep -vE '(\.md$|LICENSE$|^\.gitignore$|^\.dockerignore$|^\.editorconfig$|^\.github/|^\.vscode/|^scripts/)' |
            wc -l
          )

          echo "count=$REAL_CHANGES" >> "$GITHUB_OUTPUT"

      - name: Bump Versions
        if: github.event_name == 'workflow_dispatch' || steps.check.outputs.count > 0
        id: bump
        run: node scripts/bump-versions.mjs

      - name: Commit, Push and Tag (or skip)
        id: tag_check
        shell: bash
        run: |
          set -euo pipefail

          echo "tagged=false" >> "$GITHUB_OUTPUT"
          echo "tag=" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "${{ steps.check.outputs.count }}" -eq 0 ]; then
            echo "No release-worthy changes detected; skipping tagging."
            exit 0
          fi

          VERSION="${{ steps.bump.outputs.new_version }}"

          if [ -z "$VERSION" ]; then
            echo "ERROR: bump step did not produce new_version. Check scripts/bump-versions.mjs outputs."
            exit 1
          fi

          TAG="v$VERSION"

          git add .
          git commit -m "chore(release): $VERSION [skip ci]" || echo "Nothing to commit."
          git tag "$TAG"
          git push origin main --tags

          echo "tagged=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  publish:
    name: Create GitHub Release
    needs: bump
    if: needs.bump.outputs.tagged == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}
          fetch-depth: 0

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          generate_release_notes: true

  docker-server:
    name: Build & Push Server Image (GHCR)
    needs: bump
    if: needs.bump.outputs.tagged == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (server)
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ghcr.io/pandetthe/snapflow-server:latest
            ghcr.io/pandetthe/snapflow-server:${{ needs.bump.outputs.tag }}

  docker-web:
    name: Build & Push Web Image (GHCR)
    needs: bump
    if: needs.bump.outputs.tagged == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (web)
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ghcr.io/pandetthe/snapflow-web:latest
            ghcr.io/pandetthe/snapflow-web:${{ needs.bump.outputs.tag }}
