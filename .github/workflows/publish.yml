name: Publish

on:
  workflow_run:
    workflows: ["Server CI", "Web CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publication-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  bump:
    name: Bump and Tag
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tagged: ${{ steps.tag_check.outputs.tagged }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for real changes
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Last tag: $LAST_TAG"
          REAL_CHANGES=$(git diff --name-only $LAST_TAG HEAD | grep -vE '(\.md$|LICENSE$|^\.gitignore$|^\.dockerignore$|^\.editorconfig$|^\.github/|^\.vscode/|^scripts/)' | wc -l || echo "0")
          echo "count=$REAL_CHANGES" >> $GITHUB_OUTPUT

      - name: Bump Versions
        if: github.event_name == 'workflow_dispatch' || steps.check.outputs.count > 0
        id: bump
        run: node scripts/bump-versions.mjs

      - name: Commit, Push and Tag
        if: github.event_name == 'workflow_dispatch' || steps.check.outputs.count > 0
        id: tag_check
        run: |
          VERSION=${{ steps.bump.outputs.new_version }}
          git add .
          git commit -m "chore(release): $VERSION [skip ci]"
          git tag v$VERSION
          git push origin main --tags
          echo "tagged=true" >> $GITHUB_OUTPUT

  publish:
    name: Create GitHub Release
    needs: bump
    if: needs.bump.outputs.tagged == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(git describe --tags --abbrev=0)
          gh release create $TAG \
            --title "$TAG" \
            --generate-notes

  docker-server:
    name: Push Server Image
    needs: bump
    if: needs.bump.outputs.tagged == 'true'
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: pandetthe/snapflow-server
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Get Tag
        id: vars
        run: echo "tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=true
            type=raw,value=${{ steps.vars.outputs.tag }}
            type=sha,format=short
      - uses: docker/build-push-action@v5
        with:
          context: ./server
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-web:
    name: Push Web Image
    needs: bump
    if: needs.bump.outputs.tagged == 'true'
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: pandetthe/snapflow-web
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Get Tag
        id: vars
        run: echo "tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=true
            type=raw,value=${{ steps.vars.outputs.tag }}
            type=sha,format=short
      - uses: docker/build-push-action@v5
        with:
          context: ./web
          file: web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
