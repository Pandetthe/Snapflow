name: Trigger auto deployment for aca-snapflow-server-prod

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/aca-snapflow-server-prod-AutoDeployTrigger-611db72c-b220-45b8-9b4e-63d7945b8c02.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ACASNAPFLOWSERVERPROD_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ACASNAPFLOWSERVERPROD_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ACASNAPFLOWSERVERPROD_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ghcr.io
          registryUsername: ${{ secrets.ACASNAPFLOWSERVERPROD_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ACASNAPFLOWSERVERPROD_REGISTRY_PASSWORD }}
          containerAppName: aca-snapflow-server-prod
          resourceGroup: snapflow
          imageToBuild: ghcr.io/aca-snapflow-server-prod:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


